[tox]
envlist = py310, py311, py312, py313, lint, typecheck
minversion = 4.0

[testenv]
description = Run tests with pytest
deps =
    pytest
    pytest-cov
commands =
    pytest --cov=ddlgenerator --cov-report=term-missing --cov-fail-under=80 --tb=short {posargs}

[testenv:lint]
description = Run linting with ruff and flake8
deps =
    ruff
    flake8
commands =
    ruff check ddlgenerator/ tests/
    flake8 ddlgenerator/ tests/ --max-line-length=120 --ignore=E501,W503

[testenv:typecheck]
description = Run static type checking with mypy (optional)
deps =
    mypy
    types-python-dateutil
    types-requests
    types-PyYAML
commands =
    mypy ddlgenerator/ --ignore-missing-imports
ignore_outcome = true

[testenv:coverage]
description = Generate coverage report
deps =
    pytest
    pytest-cov
commands =
    pytest --cov=ddlgenerator --cov-report=html --cov-report=term {posargs}
